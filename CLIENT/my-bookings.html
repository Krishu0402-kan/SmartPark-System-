<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartPark – My Bookings</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🅿</div>
    <div class="logo-text">SmartPark</div>
    <div class="logo-sub">Smart Parking System</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Navigation</div>
    <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
    <a href="book-slot.html" class="nav-link"><span class="nav-icon">📅</span> Book a Slot</a>
    <a href="my-bookings.html" class="nav-link active"><span class="nav-icon">📋</span> My Bookings</a>
    <a href="about.html" class="nav-link"><span class="nav-icon">ℹ️</span> About</a>
  </nav>
  <div class="sidebar-footer">
    <span class="status-dot" id="apiDot"></span>
    <span class="status-text" id="apiStatus">Checking...</span>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">My Bookings</div>
      <div class="page-subtitle">View and manage all parking bookings</div>
    </div>
    <div class="topbar-right">
      <a href="book-slot.html" class="btn btn-primary btn-sm">+ New Booking</a>
    </div>
  </div>

  <div class="content">

    <div class="panel">
      <div class="panel-header">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" onclick="filterBy('all', this)">All</button>
          <button class="filter-tab" onclick="filterBy('active', this)">🟢 Active</button>
          <button class="filter-tab" onclick="filterBy('emergency', this)">🚨 Emergency</button>
          <button class="filter-tab" onclick="filterBy('completed', this)">✅ Completed</button>
          <button class="filter-tab" onclick="filterBy('cancelled', this)">❌ Cancelled</button>
        </div>
        <div class="search-bar" style="width:230px">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-control" id="searchInput" placeholder="Search name, vehicle, slot..." oninput="applySearch()"/>
        </div>
      </div>

      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>##</th><th>Slot</th><th>Owner</th><th>Vehicle</th>
              <th>Phone</th><th>Check In</th><th>Check Out</th>
              <th>Type</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <tr><td colspan="10" style="text-align:center;padding:48px">
              <div class="loading-spinner" style="width:28px;height:28px;border-width:3px"></div>
            </td></tr>
          </tbody>
        </table>
      </div>

      <div id="bookingCount" style="padding:12px 20px;font-size:0.78rem;color:var(--text-muted);border-top:1px solid var(--border)"></div>
    </div>

  </div>
</main>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title" style="color:var(--red)">🗑 Delete Booking</div>
    <div class="modal-body" id="deleteModalMsg">Are you sure you want to delete this booking?</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'http://localhost:3000/api';
let allBookings = [];
let currentFilter = 'all';
let deleteId = null;

function showToast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

async function loadBookings() {
  try {
    const res  = await fetch(`${API}/bookings`);
    const data = await res.json();
    allBookings = data.bookings || [];
    renderTable(allBookings);
  } catch {
    showToast('Failed to load bookings. Is the API running?', 'error');
    document.getElementById('bookingsBody').innerHTML =
      '<tr><td colspan="10"><div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-text">API unavailable</div></div></td></tr>';
  }
}

function filterBy(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  applySearch();
}

function applySearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = [...allBookings];

  if (currentFilter === 'emergency') {
    filtered = filtered.filter(b => b.booking_type === 'emergency');
  } else if (currentFilter !== 'all') {
    filtered = filtered.filter(b => b.status === currentFilter);
  }

  if (q) {
    filtered = filtered.filter(b =>
      (b.owner_name || '').toLowerCase().includes(q) ||
      (b.vehicle_number || '').toLowerCase().includes(q) ||
      (b.slot_number || '').toLowerCase().includes(q) ||
      (b.phone || '').includes(q)
    );
  }

  renderTable(filtered);
}

function renderTable(bookings) {
  const tbody = document.getElementById('bookingsBody');
  const count = document.getElementById('bookingCount');
  count.textContent = `Showing ${bookings.length} booking${bookings.length !== 1 ? 's' : ''}`;

  if (!bookings.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state">
      <span class="empty-state-icon">📭</span>
      <div class="empty-state-text">No bookings found</div>
    </div></td></tr>`;
    return;
  }

  const statusBadge = {
    active:    '<span class="badge badge-green">Active</span>',
    completed: '<span class="badge badge-blue">Completed</span>',
    cancelled: '<span class="badge badge-red">Cancelled</span>'
  };

  tbody.innerHTML = bookings.map(b => `
    <tr>
      <td style="color:var(--text-muted);font-size:0.82rem">#${b.id}</td>
      <td>
        <strong style="color:var(--text-primary)">${b.slot_number || '—'}</strong>
        <br><small style="color:var(--text-muted)">${b.floor || ''} Floor</small>
      </td>
      <td style="color:var(--text-primary)">${b.owner_name}</td>
      <td style="font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:0.6px;color:var(--text-primary)">${b.vehicle_number}</td>
      <td style="color:var(--text-muted)">${b.phone}</td>
      <td style="font-size:0.8rem;color:var(--text-muted)">${b.check_in}</td>
      <td style="font-size:0.8rem;color:var(--text-muted)">${b.check_out || '—'}</td>
      <td>${b.booking_type === 'emergency'
        ? '<span class="badge badge-red">🚨 Emergency</span>'
        : '<span class="badge badge-green">Normal</span>'}</td>
      <td>${statusBadge[b.status] || b.status}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center">
          <a href="edit-booking.html?id=${b.id}" class="btn btn-amber btn-sm" title="Edit booking">✏️ Edit</a>
          <button class="btn btn-danger btn-sm" onclick="openDelete(${b.id}, '${b.owner_name.replace(/'/g,"\\'")}', '${b.status}')" title="Delete booking">🗑</button>
        </div>
      </td>
    </tr>`).join('');
}

function openDelete(id, name, status) {
  deleteId = id;
  const extra = status === 'active' ? ' The slot will be freed automatically.' : '';
  document.getElementById('deleteModalMsg').textContent =
    `Delete booking #${id} for "${name}"? This action cannot be undone.${extra}`;
  document.getElementById('deleteModal').classList.add('open');
}

function closeModal() {
  document.getElementById('deleteModal').classList.remove('open');
  deleteId = null;
}

async function confirmDelete() {
  if (!deleteId) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.innerHTML = '<span class="loading-spinner"></span> Deleting...';
  btn.disabled = true;

  try {
    const res  = await fetch(`${API}/bookings/${deleteId}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) {
      showToast(data.error || 'Delete failed', 'error');
    } else {
      showToast(data.message || 'Booking deleted', 'success');
      closeModal();
      loadBookings();
    }
  } catch {
    showToast('Connection error', 'error');
  } finally {
    btn.innerHTML = 'Delete';
    btn.disabled = false;
  }
}

document.getElementById('deleteModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadBookings();
</script>

<script>
(async function checkAPI() {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiStatus');
  if (!dot || !txt) return;
  try {
    const res = await fetch('http://localhost:3000/', { signal: AbortSignal.timeout(3000) });
    if (res.ok) { dot.style.background = 'var(--green)'; txt.textContent = 'API Connected'; }
    else throw new Error();
  } catch {
    dot.style.background = 'var(--red)';
    dot.style.animation = 'none';
    txt.textContent = 'API Offline';
    txt.style.color = 'var(--red)';
  }
})();
</script>
</body>
</html>
